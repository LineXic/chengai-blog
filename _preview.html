    <style>
        .bio-entry-card {
            display: block;
            padding: 30px 35px;
            margin-top: 40px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .bio-entry-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            color: white;
        }
        .bio-entry-card::after {
            content: '→';
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2em;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .bio-entry-card:hover::after {
            opacity: 1;
            right: 25px;
        }
        .bio-entry-title { font-size: 1.6em; font-weight: 600; margin-bottom: 8px; }
        .bio-entry-desc { font-size: 1em; opacity: 0.9; }
    </style>
</head>
